<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SEAVEN</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--black:#1A1A1A;--gray:#8E8E93;--light:#F2F2F7;--border:#E5E5EA;--grad:linear-gradient(135deg,#C9A84C,#7EC8A4,#4FC4CF,#4A90D9);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-font-smoothing:antialiased;}
body{background:#D4D4DB;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;font-family:'Manrope',-apple-system,sans-serif;gap:14px;}
.phone{width:375px;height:812px;background:white;border-radius:52px;box-shadow:0 32px 80px rgba(0,0,0,0.18),0 0 0 1px rgba(0,0,0,0.06);overflow:hidden;position:relative;}
/* Tout ce qui est enfant direct de .phone et pas une vue/module reste invisible */
.phone>*:not(.page):not(.screen):not(.module):not(.prof-module){display:none!important;}

/* vues */
.page,.screen{position:absolute;inset:0;display:none;flex-direction:column;background:white;overflow:hidden;}
.page.on,.screen.on{display:flex;}
/* modules — slide depuis droite, DANS .phone, z-index élevé */
.module{position:absolute;inset:0;display:flex;flex-direction:column;background:white;overflow:hidden;transform:translateX(100%);transition:transform .28s cubic-bezier(.4,0,.2,1);pointer-events:none;z-index:60;}
.module.on{transform:translateX(0);pointer-events:all;}

/* ══ ONBOARDING ══ */
#splash{align-items:center;justify-content:space-between;padding:60px 0 48px;}
.splash-top{flex:1;display:flex;align-items:center;justify-content:center;}
.splash-scene{position:relative;width:160px;height:200px;}
.peacock-profile{position:absolute;inset:0;animation:pArrive .9s cubic-bezier(.4,0,.2,1) .4s both,pTurn .4s ease 1.5s both;}
.peacock-front{position:absolute;inset:0;opacity:0;animation:pShow .01s 2.0s both;}
.peacock-wings{position:absolute;inset:-70px;transform-origin:center 70%;transform:scale(0);animation:pWings .7s cubic-bezier(.34,1.56,.64,1) 2.1s both;}
.seaven-text{text-align:center;opacity:0;animation:pFade .8s ease 2.8s both;}
.seaven-name{font-size:30px;font-weight:900;color:var(–black);letter-spacing:-1px;}
.seaven-tag{font-size:11px;color:var(–gray);font-weight:600;margin-top:4px;}
@keyframes pArrive{from{transform:translateX(-200px) scaleX(-1);opacity:0;}to{transform:translateX(0) scaleX(-1);opacity:1;}}
@keyframes pTurn{to{opacity:0;}}
@keyframes pShow{to{opacity:1;}}
@keyframes pWings{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes pFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.splash-bottom{padding:0 28px;width:100%;}
.splash-main-btn{width:100%;padding:16px;border-radius:14px;background:var(–black);color:white;font-size:16px;font-weight:800;border:none;cursor:pointer;font-family:'Manrope',sans-serif;margin-bottom:14px;}
.splash-links{display:flex;justify-content:center;gap:6px;font-size:14px;color:var(–gray);font-weight:600;}
.splash-links span{color:var(–black);font-weight:800;cursor:pointer;}
.ob-nav{display:flex;align-items:center;gap:12px;padding:14px 20px 0;flex-shrink:0;}
.ob-back{font-size:24px;color:var(–black);cursor:pointer;}
.ob-step{font-size:13px;font-weight:700;color:var(–gray);}
.ob-header{padding:12px 24px 0;flex-shrink:0;}
.ob-title{font-size:24px;font-weight:900;color:var(–black);line-height:1.2;}
.ob-sub{font-size:14px;color:var(–gray);margin-top:6px;line-height:1.5;}
.ob-scroll{flex:1;overflow-y:auto;padding:14px 24px 8px;}
.ob-scroll::-webkit-scrollbar{display:none;}
.ob-bottom{padding:10px 24px 36px;flex-shrink:0;}
.ob-btn{width:100%;padding:15px;border-radius:14px;background:var(–black);color:white;font-size:15px;font-weight:800;border:none;cursor:pointer;font-family:'Manrope',sans-serif;}
.ob-btn:disabled{opacity:.4;}
.ob-skip{width:100%;padding:10px;background:none;border:none;color:var(–gray);font-size:13px;font-weight:600;cursor:pointer;font-family:'Manrope',sans-serif;margin-top:6px;}
.ob-field{margin-bottom:13px;}
.ob-label{font-size:11px;font-weight:700;color:var(–gray);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.ob-input{width:100%;border:1.5px solid var(–border);border-radius:12px;padding:12px 14px;font-size:14px;font-family:'Manrope',sans-serif;outline:none;color:var(–black);}
.ob-input:focus{border-color:var(–black);}
.ob-input::placeholder{color:var(–gray);}
.ob-row{display:flex;gap:10px;}
.ob-row .ob-field{flex:1;}
.ob-prefix-wrap{display:flex;align-items:center;border:1.5px solid var(–border);border-radius:12px;overflow:hidden;}
.ob-prefix-wrap:focus-within{border-color:var(–black);}
.ob-prefix{padding:12px 12px 12px 14px;font-size:13px;font-weight:700;color:var(–gray);background:var(–light);border-right:1px solid var(–border);flex-shrink:0;white-space:nowrap;}
.ob-prefix-input{flex:1;border:none;outline:none;padding:12px 14px;font-size:14px;font-family:'Manrope',sans-serif;color:var(–black);}
.ob-prefix-input::placeholder{color:var(–gray);}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(–light);border-radius:12px;margin-bottom:10px;}
.tr-text{font-size:14px;font-weight:700;color:var(–black);}
.tr-sub{font-size:11px;color:var(–gray);margin-top:2px;}
.toggle-ob{width:44px;height:26px;border-radius:13px;background:var(–border);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle-ob.on{background:var(–black);}
.toggle-ob::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:white;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle-ob.on::after{transform:translateX(18px);}
.ia-helper{background:var(–light);border-radius:12px;padding:12px 14px;margin-top:6px;display:none;}
.ia-helper.on{display:block;}
.ia-helper-title{font-size:11px;font-weight:700;color:var(–gray);text-transform:uppercase;letter-spacing:.4px;margin-bottom:10px;}
.ia-prefs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}
.ia-pref{padding:6px 12px;border:1.5px solid var(–border);border-radius:20px;font-size:11px;font-weight:700;color:var(–gray);cursor:pointer;background:white;}
.ia-pref.on{background:var(–black);color:white;border-color:var(–black);}
.ia-suggestions{display:flex;flex-direction:column;gap:6px;}
.ia-sug{display:flex;align-items:center;gap:10px;padding:9px 12px;background:white;border-radius:10px;border:1.5px solid transparent;cursor:pointer;}
.ia-sug.sel{border-color:var(–black);}
.ia-sug-name{font-size:14px;font-weight:800;color:var(–black);flex:1;}
.ia-sug-style{font-size:10px;color:var(–gray);}
.otp-row{display:flex;gap:8px;justify-content:center;margin:20px 0;}
.otp-box{width:48px;height:58px;border:2px solid var(–border);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:900;color:var(–black);}
.otp-box.active{border-color:var(–black);}
.ob-resend{text-align:center;font-size:13px;color:var(–gray);font-weight:600;}
.ob-resend span{color:var(–black);font-weight:800;cursor:pointer;}
.choice-cards{display:flex;flex-direction:column;gap:12px;padding:16px 0;}
.choice-card{padding:22px;border:2px solid var(–border);border-radius:18px;cursor:pointer;transition:all .2s;position:relative;}
.choice-card.sel{border-color:var(–black);background:var(–black);}
.cc-check{position:absolute;top:14px;right:14px;width:22px;height:22px;border-radius:50%;background:white;display:none;align-items:center;justify-content:center;font-size:11px;}
.choice-card.sel .cc-check{display:flex;}
.cc-icon{font-size:32px;margin-bottom:10px;}
.cc-title{font-size:18px;font-weight:900;color:var(–black);margin-bottom:4px;}
.cc-sub{font-size:13px;color:var(–gray);line-height:1.4;}
.choice-card.sel .cc-title,.choice-card.sel .cc-sub{color:white;}
.photo-circle{width:110px;height:110px;border-radius:50%;background:var(–light);border:2px dashed var(–border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
.photo-options{display:flex;gap:10px;}
.photo-opt{padding:8px 16px;border:1.5px solid var(–border);border-radius:20px;font-size:12px;font-weight:700;color:var(–black);cursor:pointer;}
.metier-wrap{display:flex;flex-wrap:wrap;gap:8px;}
.metier-chip{padding:10px 16px;border:2px solid var(–border);border-radius:20px;font-size:13px;font-weight:700;color:var(–black);cursor:pointer;}
.metier-chip.on{background:var(–black);color:white;border-color:var(–black);}
.min-info{text-align:center;font-size:12px;color:var(–gray);font-weight:600;margin-top:10px;}
.min-count{color:var(–black);font-weight:800;}
.spe-block{margin-bottom:18px;}
.spe-metier-title{font-size:15px;font-weight:800;color:var(–black);margin-bottom:10px;}
.spe-chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:8px;}
.spe-chip{padding:7px 14px;border:1.5px solid var(–border);border-radius:20px;font-size:12px;font-weight:600;color:var(–black);cursor:pointer;}
.spe-chip.on{background:var(–black);color:white;border-color:var(–black);}
.statut-cards{display:flex;flex-direction:column;gap:8px;}
.statut-card{border:2px solid var(–border);border-radius:14px;cursor:pointer;overflow:hidden;}
.statut-card.sel{border-color:var(–black);}
.statut-card-top{display:flex;align-items:center;gap:12px;padding:14px;}
.sc-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(–border);flex-shrink:0;}
.statut-card.sel .sc-dot{border-color:var(–black);background:var(–black);box-shadow:inset 0 0 0 3px white;}
.sc-ic{font-size:22px;flex-shrink:0;}
.sc-title{font-size:14px;font-weight:800;color:var(–black);}
.sc-sub{font-size:11px;color:var(–gray);margin-top:1px;}
.statut-expand{display:none;padding:0 14px 14px;}
.statut-expand.on{display:block;}
.config-title{font-size:13px;font-weight:800;color:var(–black);margin-bottom:8px;}
.days-row{display:flex;gap:6px;flex-wrap:wrap;}
.day-btn{width:40px;height:40px;border-radius:10px;border:1.5px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(–gray);cursor:pointer;}
.day-btn.on{background:var(–black);color:white;border-color:var(–black);}
.abo-slider-wrap{margin:16px 0 20px;}
.abo-labels{display:flex;justify-content:space-between;margin-bottom:8px;}
.abo-lbl{font-size:10px;font-weight:700;color:var(–gray);text-align:center;cursor:pointer;flex:1;}
.abo-lbl.on{color:var(–black);}
.abo-track{height:6px;background:var(–light);border-radius:3px;position:relative;cursor:pointer;}
.abo-fill{height:100%;background:var(–black);border-radius:3px;transition:width .3s;}
.abo-thumb{position:absolute;top:50%;width:20px;height:20px;border-radius:50%;background:var(–black);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.25);transform:translate(-50%,-50%);transition:left .3s;}
.plan-box{background:var(–light);border-radius:18px;padding:20px;}
.plan-level{font-size:13px;font-weight:700;color:var(–gray);}
.plan-price-big{font-size:36px;font-weight:900;color:var(–black);}
.plan-period{font-size:13px;color:var(–gray);font-weight:600;}
.plan-features{display:flex;flex-direction:column;gap:6px;margin-top:14px;}
.plan-feat{font-size:13px;color:var(–black);font-weight:600;}
.trial-pill{display:inline-flex;align-items:center;gap:6px;background:#F0FFF4;border:1px solid #C8F0D8;border-radius:20px;padding:6px 14px;font-size:12px;font-weight:700;color:#2A8A50;margin-bottom:14px;}

/* ══ ACCUEIL commun ══ */
.sbar{display:flex;justify-content:space-between;padding:14px 28px 0;font-size:12px;font-weight:700;color:#1A1A1A;flex-shrink:0;}
.stories-wrap{padding:10px 18px 8px;flex-shrink:0;}
.stories-row{display:flex;gap:14px;overflow-x:auto;padding-bottom:2px;}
.stories-row::-webkit-scrollbar{display:none;}
.story-item{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;cursor:pointer;}
.story-ring{width:58px;height:58px;border-radius:50%;padding:2.5px;background:var(–grad);}
.story-ring.empty{background:var(–border);}
.story-inner{width:100%;height:100%;border-radius:50%;background:white;display:flex;align-items:center;justify-content:center;font-size:24px;border:2px solid white;}
.story-vous{width:100%;height:100%;border-radius:50%;background:linear-gradient(135deg,#E8638C,#A87DC8);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:white;border:2px solid white;}
.story-ring-wrap{position:relative;}
.story-add-btn{position:absolute;bottom:-1px;right:-1px;width:18px;height:18px;border-radius:50%;background:#007AFF;border:2px solid white;display:flex;align-items:center;justify-content:center;font-size:11px;color:white;font-weight:900;}
.story-name{font-size:11px;font-weight:600;color:var(–black);max-width:58px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.divider{height:1px;background:var(–border);flex-shrink:0;}
.grid-area{height:551px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;padding-top:4px;}
.grid-slider{flex:1;overflow:hidden;}
.grid-track{display:flex;height:100%;transition:transform .32s cubic-bezier(.4,0,.2,1);}
.grid-page{min-width:375px;width:375px;height:100%;display:grid;grid-template-columns:93px 93px 93px 93px;grid-template-rows:repeat(4,1fr);padding:0;gap:0;overflow:hidden;}
.app-item{width:93px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:pointer;-webkit-tap-highlight-color:transparent;}
.app-item:active .app-icon{transform:scale(.88);}
.app-icon{width:60px;height:60px;border-radius:15px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:26px;box-shadow:0 1px 6px rgba(0,0,0,.08);position:relative;transition:transform .12s;}
.app-badge{position:absolute;top:-4px;right:-4px;background:#FF3B30;color:white;font-size:9px;font-weight:800;min-width:16px;height:16px;border-radius:8px;padding:0 4px;display:flex;align-items:center;justify-content:center;border:2px solid white;}
.app-name{font-size:11px;font-weight:600;color:var(–black);text-align:center;line-height:1.2;max-width:66px;}
.page-dots{display:flex;justify-content:center;gap:6px;padding:5px 0 3px;flex-shrink:0;}
.pdot{width:6px;height:6px;border-radius:50%;background:var(–border);transition:all .2s;}
.pdot.on{width:18px;border-radius:3px;background:var(–black);}
.search-zone{padding:4px 18px 8px;flex-shrink:0;display:flex;justify-content:center;align-items:center;min-height:48px;}
.s-icon{display:flex;align-items:center;justify-content:center;width:40px;height:40px;cursor:pointer;}
.s-icon.hidden{display:none;}
.s-bar-acc{display:none;width:100%;align-items:center;gap:10px;background:var(–light);border-radius:14px;padding:11px 14px;cursor:pointer;}
.s-bar-acc.on{display:flex;}
.s-bar-text{font-size:13px;color:var(–gray);font-weight:500;flex:1;}
.s-bar-x{font-size:16px;color:var(–gray);cursor:pointer;}
.tabbar{display:flex;align-items:flex-end;border-top:1px solid var(–border);padding:8px 4px 22px;flex-shrink:0;background:white;position:relative;z-index:10;}
.tb-item{flex:1;display:flex;flex-direction:column;align-items:center;cursor:pointer;padding:4px 0;}
.tb-icon svg{width:24px;height:24px;}
.tb-plus-wrap{flex:1;display:flex;flex-direction:column;align-items:center;margin-bottom:2px;position:relative;}
.tb-plus{width:52px;height:52px;border-radius:50%;background:var(–black);display:flex;align-items:center;justify-content:center;margin-top:-18px;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,.25);position:relative;z-index:12;transition:transform .3s cubic-bezier(.4,0,.2,1);}
.tb-plus.open{transform:translateY(-18px) rotate(45deg);}
.tb-plus svg{width:22px;height:22px;}
.fan-container{position:absolute;bottom:0;left:50%;width:0;height:0;z-index:11;pointer-events:none;}
.fan-item{position:absolute;width:54px;height:54px;border-radius:50%;background:white;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.18);pointer-events:none;opacity:0;transform:translate(-50%,-50%) scale(.3);transition:opacity .25s,transform .35s cubic-bezier(.34,1.56,.64,1);left:0;bottom:0;}
.fan-item.on{opacity:1;pointer-events:all;}
.fan-item svg{width:20px;height:20px;}
.fan-item span{font-size:8px;font-weight:800;color:var(–black);}
.fan-item[data-pos="photo"].on{transform:translate(calc(-50%),calc(-50% - 110px)) scale(1);transition-delay:0s;}
.fan-item[data-pos="video"].on{transform:translate(calc(-50% + 76px),calc(-50% - 82px)) scale(1);transition-delay:.04s;}
.fan-item[data-pos="aa"].on{transform:translate(calc(-50% - 76px),calc(-50% - 82px)) scale(1);transition-delay:.04s;}
.fan-item[data-pos="resa"].on{transform:translate(calc(-50% + 112px),calc(-50% - 36px)) scale(1);transition-delay:.08s;}
.fan-item[data-pos="vente"].on{transform:translate(calc(-50% - 112px),calc(-50% - 36px)) scale(1);transition-delay:.08s;}
.fan-backdrop{position:absolute;inset:0;z-index:9;background:rgba(0,0,0,.3);display:none;cursor:pointer;backdrop-filter:blur(2px);}
.fan-backdrop.on{display:block;}
.pro-badge{display:inline-flex;align-items:center;background:var(–black);color:white;font-size:9px;font-weight:800;padding:2px 7px;border-radius:5px;letter-spacing:.5px;vertical-align:middle;margin-left:4px;}
.search-page-acc{position:absolute;top:0;left:0;right:0;bottom:0;background:white;z-index:200;display:none;flex-direction:column;padding:52px 18px 0;}
.search-page-acc.on{display:flex;}
.sp-top{display:flex;align-items:center;gap:12px;margin-bottom:14px;}
.sp-bar{flex:1;display:flex;align-items:center;gap:8px;background:var(–light);border-radius:12px;padding:10px 12px;}
.sp-input{flex:1;border:none;outline:none;font-size:14px;font-weight:600;font-family:'Manrope',sans-serif;background:transparent;}
.sp-input::placeholder{color:var(–gray);}
.sp-cancel{font-size:14px;font-weight:700;color:var(–black);cursor:pointer;}
.sp-section{margin-bottom:16px;}
.sp-label{font-size:11px;font-weight:700;color:var(–gray);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px;}
.sp-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(–light);cursor:pointer;}
.sp-item:last-child{border-bottom:none;}
.sp-ic{width:34px;height:34px;border-radius:10px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.sp-name{font-size:14px;font-weight:600;color:var(–black);flex:1;}
.sp-meta{font-size:11px;color:var(–gray);}
.sp-arr{font-size:14px;color:var(–border);}

/* ══ MODULE header ══ */
.mod-hdr{display:flex;align-items:center;gap:12px;padding:14px 16px 10px;flex-shrink:0;border-bottom:1px solid var(–border);}
.mod-back{width:32px;height:32px;border-radius:50%;background:var(–light);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;font-weight:700;flex-shrink:0;}
.mod-title{font-size:17px;font-weight:800;color:var(–black);flex:1;}
.mod-action{font-size:13px;font-weight:700;color:var(–gray);cursor:pointer;}
.mod-scroll{flex:1;overflow-y:auto;}
.mod-scroll::-webkit-scrollbar{display:none;}
.mod-tabs{display:flex;border-bottom:1px solid var(–border);flex-shrink:0;}
.mod-tab{flex:1;padding:11px 0;text-align:center;font-size:13px;font-weight:700;color:var(–gray);cursor:pointer;border-bottom:2px solid transparent;}
.mod-tab.on{color:var(–black);border-bottom:2px solid var(–black);}
.mod-filters{display:flex;gap:7px;padding:10px 16px;overflow-x:auto;flex-shrink:0;}
.mod-filters::-webkit-scrollbar{display:none;}
.fchip{padding:6px 14px;border-radius:18px;border:1.5px solid var(–border);font-size:12px;font-weight:700;color:var(–gray);background:white;cursor:pointer;white-space:nowrap;flex-shrink:0;}
.fchip.on{background:var(–black);color:white;border-color:var(–black);}

/* ══ FEED ══ */
.view-toggle{display:flex;gap:6px;padding:8px 16px;flex-shrink:0;}
.vbtn{padding:5px 12px;border-radius:10px;border:1.5px solid var(–border);font-size:13px;font-weight:700;color:var(–gray);background:white;cursor:pointer;}
.vbtn.on{background:var(–black);color:white;border-color:var(–black);}
.feed-1{display:flex;flex-direction:column;gap:1px;}
.feed-2{display:grid;grid-template-columns:1fr 1fr;gap:2px;}
.feed-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:2px;}
.feed-card{position:relative;background:var(–light);aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:40px;overflow:hidden;cursor:pointer;}
.feed-card .overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.4));padding:12px;}
.feed-card .f-name{font-size:13px;font-weight:700;color:white;}
.feed-card .f-meta{font-size:11px;color:rgba(255,255,255,.7);}
.feed-2 .overlay,.feed-3 .overlay{display:none;}
.fc1{background:#E8E0F0;}.fc2{background:#E0EEE8;}.fc3{background:#F0EEE0;}.fc4{background:#F0E0E8;}.fc5{background:#E0EAF0;}.fc6{background:#EEF0E0;}

/* ══ PROMOS ══ */
.promo-card{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(–border);cursor:pointer;}
.promo-avatar{width:52px;height:52px;border-radius:14px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.promo-name{font-size:14px;font-weight:800;color:var(–black);}
.promo-meta{font-size:12px;color:var(–gray);margin-top:2px;}
.promo-badge{display:inline-block;background:var(–black);color:white;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;margin-top:6px;}
.promo-badge-outline{display:inline-block;border:1.5px solid var(–black);color:var(–black);font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;margin-top:6px;margin-left:5px;}
.promo-dates{font-size:11px;color:#AAA;margin-top:4px;}

/* ══ URGENCE ══ */
.urgence-card{margin:10px 16px;border:1.5px solid var(–border);border-radius:16px;overflow:hidden;}
.uc-top{display:flex;gap:12px;padding:14px;align-items:center;border-bottom:1px solid var(–border);}
.uc-avatar{width:46px;height:46px;border-radius:12px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.uc-name{font-size:14px;font-weight:800;color:var(–black);}
.uc-meta{font-size:12px;color:var(–gray);margin-top:2px;}
.uc-promo{font-size:11px;font-weight:700;color:var(–black);background:var(–light);padding:2px 8px;border-radius:6px;margin-top:4px;display:inline-block;}
.uc-slots{display:flex;gap:8px;padding:12px 14px;}
.uc-slot{flex:1;border:1.5px solid var(–border);border-radius:12px;padding:10px 8px;text-align:center;cursor:pointer;}
.uc-time{font-size:14px;font-weight:800;color:var(–black);}
.uc-dur{font-size:10px;color:var(–gray);margin-top:2px;}
.uc-book{margin:0 14px 14px;padding:11px;border-radius:12px;background:var(–black);color:white;font-size:13px;font-weight:700;border:none;cursor:pointer;width:calc(100% - 28px);font-family:'Manrope',sans-serif;}

/* ══ MARKETPLACE ══ */
.mkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px;}
.mkt-card{border:1.5px solid var(–border);border-radius:14px;overflow:hidden;cursor:pointer;}
.mkt-img{aspect-ratio:1;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:32px;}
.mkt-info{padding:10px;}
.mkt-name{font-size:13px;font-weight:700;color:var(–black);line-height:1.3;}
.mkt-seller{font-size:11px;color:var(–gray);margin-top:2px;}
.mkt-price{font-size:14px;font-weight:800;color:var(–black);margin-top:6px;}
.mkt-tag{font-size:10px;color:var(–gray);background:var(–light);padding:2px 7px;border-radius:6px;display:inline-block;margin-top:4px;}
.myprod-card{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid var(–border);align-items:center;}
.mp-img{width:52px;height:52px;border-radius:12px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.mp-name{font-size:14px;font-weight:700;color:var(–black);}
.mp-meta{font-size:12px;color:var(–gray);margin-top:2px;}
.mp-price{font-size:14px;font-weight:800;color:var(–black);margin-left:auto;}
.add-btn{margin:12px 16px;padding:13px;border-radius:13px;border:1.5px dashed var(–border);background:white;color:var(–gray);font-size:13px;font-weight:700;cursor:pointer;width:calc(100% - 32px);text-align:center;font-family:'Manrope',sans-serif;display:block;}

/* ══ NOTIFS ══ */
.notif-item{display:flex;gap:12px;padding:13px 16px;border-bottom:1px solid var(–border);cursor:pointer;align-items:flex-start;}
.notif-item.unread{background:#FAFAFA;}
.notif-dot{width:8px;height:8px;border-radius:50%;background:var(–black);flex-shrink:0;margin-top:6px;}
.notif-dot.read{background:transparent;}
.notif-avatar{width:40px;height:40px;border-radius:50%;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
.notif-text{flex:1;font-size:13px;color:var(–black);line-height:1.5;}
.notif-text strong{font-weight:700;}
.notif-time{font-size:11px;color:#AAA;margin-top:3px;}

/* ══ À DOMICILE ══ */
.dom-card{margin:8px 16px;border:1.5px solid var(–border);border-radius:16px;overflow:hidden;}
.dom-top{display:flex;gap:12px;padding:14px;align-items:center;}
.dom-av{width:52px;height:52px;border-radius:14px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.dom-name{font-size:15px;font-weight:800;color:var(–black);}
.dom-meta{font-size:12px;color:var(–gray);margin-top:2px;}
.dom-stars{font-size:12px;color:var(–black);font-weight:700;margin-top:3px;}
.dom-tags{display:flex;gap:6px;flex-wrap:wrap;padding:0 14px 12px;}
.dom-tag{font-size:11px;font-weight:700;color:var(–gray);background:var(–light);padding:3px 10px;border-radius:8px;}
.dom-tag.price{color:var(–black);background:#EBEBEB;}
.dom-bottom{display:flex;gap:8px;padding:0 14px 14px;}
.dom-btn{flex:1;padding:10px;border-radius:11px;border:1.5px solid var(–border);font-size:13px;font-weight:700;color:var(–black);cursor:pointer;text-align:center;background:white;font-family:'Manrope',sans-serif;}
.dom-btn.dark{background:var(–black);color:white;border-color:var(–black);}

/* ══ PANIER ══ */
.cart-item{display:flex;gap:12px;padding:14px 16px;border-bottom:1px solid #F5F5F5;align-items:center;}
.cart-check{width:22px;height:22px;border-radius:6px;border:1.5px solid #DDD;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:12px;}
.cart-check.on{background:var(–black);border-color:var(–black);color:white;}
.cart-img{width:52px;height:52px;border-radius:12px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.cart-name{font-size:14px;font-weight:700;color:var(–black);}
.cart-seller{font-size:11px;color:var(–gray);margin-top:2px;}
.cart-stock{font-size:11px;color:#AAA;margin-top:2px;}
.cart-price{font-size:15px;font-weight:800;color:var(–black);margin-left:auto;flex-shrink:0;}
.cart-qty{display:flex;align-items:center;gap:7px;margin-top:4px;}
.cq-btn{width:24px;height:24px;border-radius:6px;border:1.5px solid var(–border);display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;}
.cq-val{font-size:13px;font-weight:800;color:var(–black);min-width:16px;text-align:center;}
.cart-bottom{padding:12px 16px;border-top:1px solid var(–border);flex-shrink:0;background:white;}
.cart-total-row{display:flex;justify-content:space-between;margin-bottom:10px;}
.ct-lbl{font-size:14px;font-weight:700;color:var(–black);}
.ct-val{font-size:18px;font-weight:800;color:var(–black);}
.btn-main{width:100%;padding:14px;border-radius:14px;background:var(–black);color:white;font-size:15px;font-weight:700;border:none;cursor:pointer;font-family:'Manrope',sans-serif;}
.cart-sel-row{display:flex;align-items:center;justify-content:space-between;padding:6px 16px 0;}
.cart-sel-lbl{font-size:12px;font-weight:700;color:var(–gray);cursor:pointer;}

/* ══ CONCOURS ══ */
.concours-card{margin:8px 16px;border:1.5px solid var(–border);border-radius:16px;overflow:hidden;}
.cc-top{padding:14px;}
.cc-header{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.cc-av{width:42px;height:42px;border-radius:12px;background:var(–light);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.cc-name{font-size:14px;font-weight:800;color:var(–black);}
.cc-by{font-size:11px;color:var(–gray);margin-top:2px;}
.cc-lot{background:#F8F8F8;border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.cc-lot-lbl{font-size:10px;font-weight:700;color:#AAA;text-transform:uppercase;margin-bottom:3px;}
.cc-lot-val{font-size:13px;font-weight:700;color:var(–black);}
.cc-rules{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.cc-rule{display:flex;gap:7px;font-size:12px;color:#666;align-items:center;}
.cc-rule-dot{width:4px;height:4px;border-radius:50%;background:#AAA;flex-shrink:0;}
.cc-footer{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:#F8F8F8;border-top:1px solid var(–border);}
.cc-deadline{font-size:11px;color:var(–gray);}
.cc-nb{font-size:11px;font-weight:700;color:var(–black);}
.cc-btn{padding:8px 18px;border-radius:10px;background:var(–black);color:white;font-size:12px;font-weight:700;border:none;cursor:pointer;font-family:'Manrope',sans-serif;}
.result-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:10px;font-size:12px;font-weight:700;margin-bottom:8px;}
.rb-won{background:#F0FAF4;color:#3DA874;}
.rb-lost{background:#F8F8F8;color:#AAA;}
.rb-pending{background:#FFFBE0;color:#C8960A;}
